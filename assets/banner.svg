<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0033"/>
      <stop offset="35%" stop-color="#4a1a7a"/>
      <stop offset="70%" stop-color="#c21e6e"/>
      <stop offset="100%" stop-color="#ff9a00"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffd9a0"/>
      <stop offset="100%" stop-color="#ff9a00"/>
    </linearGradient>

    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="300" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#grid)"/>

    <!-- floating particles -->
    <circle cx="120" cy="60" r="2.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="1080" cy="80" r="2" fill="#ffd9a0" opacity="0.6"/>
    <circle cx="200" cy="230" r="1.8" fill="#ffffff" opacity="0.4"/>
    <circle cx="1000" cy="240" r="2.5" fill="#ff9a00" opacity="0.5"/>
    <circle cx="60" cy="180" r="1.5" fill="#ffffff" opacity="0.35"/>
    <circle cx="1140" cy="160" r="2" fill="#ffffff" opacity="0.3"/>

    <!-- corner code brackets -->
    <text x="34" y="60" font-family="Consolas, 'Fira Code', monospace" font-size="30" fill="#ffffff" opacity="0.35">&lt;</text>
    <text x="1140" y="60" font-family="Consolas, 'Fira Code', monospace" font-size="30" fill="#ffffff" opacity="0.35">/&gt;</text>
    <text x="34" y="270" font-family="Consolas, 'Fira Code', monospace" font-size="30" fill="#ffffff" opacity="0.35">{ }</text>
    <text x="1120" y="270" font-family="Consolas, 'Fira Code', monospace" font-size="30" fill="#ffffff" opacity="0.35">[ ]</text>

    <!-- main name -->
    <text x="600" y="150" text-anchor="middle" font-family="'Fira Code', Consolas, monospace" font-size="66" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
      PARV MODI
    </text>

    <!-- subtitle -->
    <text x="600" y="195" text-anchor="middle" font-family="Consolas, 'Fira Code', monospace" font-size="19" fill="#ffe3b8" letter-spacing="1">
      Full-Stack MERN Developer
    </text>
    <text x="600" y="225" text-anchor="middle" font-family="Consolas, 'Fira Code', monospace" font-size="15" fill="#ffffff" opacity="0.75" letter-spacing="1">
      Code. Ship. Repeat.
    </text>

    <!-- moving scanline -->
    <rect x="-300" y="0" width="300" height="300" fill="url(#scan)">
      <animate attributeName="x" from="-300" to="1200" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- bottom accent line -->
    <rect x="450" y="248" width="300" height="2" fill="#ff9a00" opacity="0.7"/>
  </g>
</svg>